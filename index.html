  else{ editTempSubjects[i].name=name; editTempSubjects[i].type=type; editEditingSubjIdx=-1; renderEditSubjList(); }
}
function removeSubj(i,ctx){ if(ctx==='modal'){modalTempSubjects.splice(i,1);renderModalSubjList();}else{editTempSubjects.splice(i,1);renderEditSubjList();} }
function addSubjToModal(){ const name=document.getElementById('mSecSubjName').value.trim(); const type=document.getElementById('mSecSubjType').value.trim(); if(!name){toast('Enter a subject name.');return;} modalTempSubjects.push({name,type,isDefault:false}); document.getElementById('mSecSubjName').value=''; document.getElementById('mSecSubjType').value=''; document.getElementById('mSecSubjName').focus(); renderModalSubjList(); }
document.getElementById('mSecSubjName').addEventListener('keydown',e=>{if(e.key==='Enter')addSubjToModal();});
function commitSection(){ const name=document.getElementById('mSecName').value.trim(); if(!name){toast('Enter a section name.');return;} if(editingSectionId){const sec=getSecs().find(s=>s.id===editingSectionId);sec.name=name;sec.subjects=modalTempSubjects;}else{curSY().sections.push({id:uid(),name,subjects:modalTempSubjects});} persist();closeModal('modalSection');updateSidebar();if(state.currentPage==='settings')renderSettings();if(state.currentPage==='dashboard')renderDashboard();toast(editingSectionId?'Section updated!':'Section added! ✓'); }
function openEditSubjects(secId){ editingSubjectsSectionId=secId; const sec=getSecs().find(s=>s.id===secId); editTempSubjects=deepCopySubs(sec.subjects); editEditingSubjIdx=-1; document.getElementById('mSubjSub').textContent=sec.name+' — remove or add subjects'; document.getElementById('mSubjName').value=''; document.getElementById('mSubjType').value=''; renderEditSubjList(); openModal('modalSubjects'); }

function exportCSV(){
  const sy=state.currentSY, hist=isHistSY(sy);
  const rows=['School Year,Section,Subject,Type,Term,Summative Test,MPS'];
  if(hist){
    const hd=HIST_DATA[sy];
    hd.sections.forEach(sec=>{ SUBJ_ORDER.forEach(subj=>{ const v=sec.subjects[subj]; if(v!=null) rows.push([`"${SY_CONFIG[sy].label}"`,`"${sec.name}"`,`"${subj}"`,'Historical','All','Full Year',v.toFixed(2)].join(',')); }); });
  } else {
    const secs=getSecs();
    [1,2,3].forEach(t=>{ secs.forEach(sec=>{ sec.subjects.forEach((subj,i)=>{ if(subj.mapehPairs && subj.mapehPairs.length){ const pairs=subj.mapehPairs; const subjLabel=subj.isMapeh?'MAPEH':subj.name; pairs.forEach((pair,pi)=>{ QS.forEach(q=>{ const v=getMPS(sec.id,t,`m${i}_${pi}`,q.key); const d=(v!==''&&v!=null)?parseFloat(v):''; rows.push([`"${SY_CONFIG[sy].label}"`,`"${sec.name}"`,`"${subjLabel}-${pair.label}"`,`"${subjLabel}"`,t,`"${q.label}"`,d].join(',')); }); }); } else { QS.forEach(q=>{ const v=getMPS(sec.id,t,i,q.key); const d=(v!==''&&v!=null)?parseFloat(v):''; rows.push([`"${SY_CONFIG[sy].label}"`,`"${sec.name}"`,`"${subj.name}"`,`"${subj.type||''}"`  ,t,`"${q.label}"`,d].join(',')); }); } }); }); });
  }
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`MPS_${sy}.csv`; a.click();
  toast('⬇ CSV exported!');
}
function saveData(){
  persist();
  toast(gDriveConnected ? '💾 Saved locally + syncing to Google Drive...' : '💾 All data saved to this browser!');
}

// ─ Backup: export full state as JSON file ─
function backupData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date(); const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.download=`MPS_Backup_TugdanNHS_${ds}.json`;
  a.click();
  toast('📦 Backup downloaded!');
}

// ─ Restore: import state from JSON backup ─
function restoreData(){
  if(!confirm('⚠️ Restore from backup? This will OVERWRITE all current data in this browser. Continue?')) return;
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.syData) throw new Error('Invalid backup file.');
        // deep restore
        state.syData={};
        Object.keys(parsed.syData).forEach(sy=>{
          state.syData[sy]={
            sections: parsed.syData[sy].sections||[],
            mps:      parsed.syData[sy].mps||{},
            locks:    parsed.syData[sy].locks||{},
            histPaste:parsed.syData[sy].histPaste||{},
          };
        });
        if(parsed.currentSY && SY_CONFIG[parsed.currentSY]) state.currentSY=parsed.currentSY;
        state.currentTerm=parsed.currentTerm||1;
        state.currentSection=null;
        state.currentPage='dashboard';
        persist();
        document.getElementById('sySelect').value=state.currentSY;
        setSY(state.currentSY);
        toast('✅ Data restored from backup!');
      }catch(err){ toast('❌ Restore failed: '+err.message); }
    };
    r.readAsText(file);
  };
  inp.click();
}

// TOAST
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }

// ════════════════════════════════════════════
//  MOBILE HELPERS
// ════════════════════════════════════════════
function mobileSaveMenu(){
  // Simple two-option action sheet
  const choice = confirm('Save data to this browser?\n\nOK = Save only\nCancel = Cancel\n\n(Use the 📦 Backup button on desktop to download a file backup.)');
  if(choice) saveData();
}

const isMobile = () => window.innerWidth <= 768;

function initMobileUI(){
  const mobile = isMobile();
  const bn = document.getElementById('bottomNav');
  const cb = document.getElementById('btnCloseSidebar');
  const toast = document.getElementById('toast');
  if(mobile){
    bn.style.display = 'flex';
    if(cb) cb.style.display = 'flex';
    if(toast) toast.style.bottom = '74px';
  } else {
    bn.style.display = 'none';
    if(cb) cb.style.display = 'none';
    if(toast) toast.style.bottom = '18px';
    // Ensure sidebar is always visible on desktop
    const sb = document.getElementById('sidebarWrap');
    if(sb){ sb.classList.remove('open'); sb.style.transform=''; }
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
  syncBottomNav();
}

function toggleSidebar(){
  const sb = document.getElementById('sidebarWrap');
  const ov = document.getElementById('sidebarOverlay');
  if(sb.classList.contains('open')){ closeSidebar(); }
  else { sb.classList.add('open'); ov.classList.add('open'); }
}
function closeSidebar(){
  document.getElementById('sidebarWrap').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function mobileGoTo(page){
  closeSidebar();
  if(isHistSY(state.currentSY) && page !== 'dashboard') return;
  goTo(page);
  syncBottomNav();
}

function syncBottomNav(){
  ['dashboard','encode','settings','save'].forEach(p=>{
    const b = document.getElementById('bnav-'+p);
    if(b) b.classList.toggle('active', p === state.currentPage);
  });
  const hist = isHistSY(state.currentSY);
  const hideOnHist = ['bnav-encode','bnav-settings','bnavSections'];
  hideOnHist.forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = hist ? 'none' : 'flex';
  });
}

// Patch selectSection to auto-close sidebar on mobile
const _origSelect = selectSection;
selectSection = function(id){
  _origSelect(id);
  if(isMobile()){ closeSidebar(); syncBottomNav(); }
};

// Patch goTo to also sync bottom nav
const _origGoTo = goTo;
goTo = function(page){
  _origGoTo(page);
  syncBottomNav();
};

// Patch setSY to re-init mobile UI
const _origSetSY = setSY;
setSY = function(sy){
  _origSetSY(sy);
  initMobileUI();
};

window.addEventListener('resize', initMobileUI);

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
function getVisiblePage(){
  return ['dashboard','encode','settings','history']
    .find(p=>document.getElementById('page-'+p).style.display!=='none') || 'dashboard';
}

// Called once at boot: always opens on the dashboard.
function bootUI(){
  document.getElementById('sySelect').value = state.currentSY;
  const cfg   = SY_CONFIG[state.currentSY];
  const badge = document.getElementById('syTypeBadge');
  badge.textContent  = cfg.type==='historical' ? 'HISTORICAL' : 'LIVE';
  badge.className    = 'sy-type-badge ' + (cfg.type==='historical' ? 'sy-type-hist' : 'sy-type-live');
  const hist = isHistSY(state.currentSY);
  document.getElementById('termbarWrap').style.display   = hist ? 'none' : 'flex';
  document.getElementById('sidebarWrap').style.display   = hist ? 'none' : 'flex';
  document.getElementById('tnav-encode').style.display   = hist ? 'none' : 'flex';
  document.getElementById('tnav-settings').style.display = hist ? 'none' : 'flex';
  updateAdminBadge();
  updateSidebar();
  updateTermLockIcons();
  renderDashboard();
  initMobileUI();
}

// Called after a Google Drive sync loads new data mid-session: refresh
// sidebar/badges and whichever page is currently on screen (no forced navigation).
function refreshUI(){
  document.getElementById('sySelect').value = state.currentSY;
  updateSidebar();
  updateTermLockIcons();
  const vp = getVisiblePage();
  const scroller=document.querySelector('.main');
  const sTop=scroller?scroller.scrollTop:0;
  if(vp==='dashboard') renderDashboard();
  if(vp==='encode')    renderEncode();
  if(vp==='settings')  renderSettings();
  if(vp==='history')   renderHistory();
  if(scroller) scroller.scrollTop=sTop;
}

loadState();
bootUI();
updateDriveUI();
initGoogleDrive();
</script>
